<meta charset="utf-8">
<title>Redirecting...</title>
<script>
var path = window.location.pathname;
var filename = path.split("/").pop();

if (filename.endsWith(".html")) {
  window.location.replace("/ai-productivity-hub/articles/" + filename);
} else {
  window.location.replace("/ai-productivity-hub/");
}
</script>
</head>
